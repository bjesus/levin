name: Android CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - 'e2e/android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - 'e2e/android/**'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: levin-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
      
      - name: Build release APK (unsigned)
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: levin-android-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: warn

  e2e-tests:
    name: E2E Tests (Android Emulator)
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: levin-android-debug
          path: android/app/build/outputs/apk/debug/
      
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      
      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # Use API 29 (Android 10) to avoid scoped storage restrictions
          # API 30+ restricts access to /sdcard/Android/data/<package>/
          api-level: 29
          arch: x86_64
          profile: pixel_5
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            chmod +x e2e/android/run_tests.sh
            ./e2e/android/run_tests.sh
        timeout-minutes: 30
      
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-android-logs
          path: |
            /tmp/levin-e2e-*/
          retention-days: 7
