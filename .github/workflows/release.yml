name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-debian:
    name: Build Debian Package (Ubuntu ${{ matrix.ubuntu }})
    runs-on: ubuntu-${{ matrix.ubuntu }}
    strategy:
      matrix:
        ubuntu: ['22.04', '24.04']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-system-dev \
            libboost-filesystem-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libglib2.0-dev \
            pkg-config \
            debhelper \
            devscripts \
            git

      - name: Build package
        run: |
          # Link packaging/debian to debian/ for dpkg-buildpackage
          ln -s packaging/debian debian
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../levin_*.deb dist/
          mv dist/levin_*.deb dist/levin_${{ github.ref_name }}_ubuntu-${{ matrix.ubuntu }}_amd64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-ubuntu-${{ matrix.ubuntu }}
          path: dist/*.deb
          retention-days: 90

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fedora: ['39', '40']
    container:
      image: fedora:${{ matrix.fedora }}
    
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            git \
            cmake \
            gcc-c++ \
            boost-devel \
            openssl-devel \
            glib2-devel \
            libcurl-devel \
            pkgconfig \
            rpm-build \
            rpmdevtools \
            systemd-rpm-macros
          # Note: libtorrent is bundled from source with WebTorrent support

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up RPM build tree
        run: |
          rpmdev-setuptree
          
          # Extract version without 'v' prefix (e.g., v0.2.2 -> 0.2.2)
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          
          # Update spec file with current version
          sed "s/^Version:.*/Version:        $VERSION/" packaging/rpm/levin.spec > ~/rpmbuild/SPECS/levin.spec
          
          # Create source tarball with version (without 'v' prefix)
          tar czf ~/rpmbuild/SOURCES/levin-$VERSION.tar.gz \
            --transform "s,^,levin-$VERSION/," \
            --exclude='.git' \
            --exclude='build' \
            .

      - name: Build RPM
        run: |
          # Extract version without 'v' prefix
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          
          cd ~/rpmbuild/SPECS
          rpmbuild -bb levin.spec
          mkdir -p $GITHUB_WORKSPACE/dist
          
          # Rename RPMs with git tag (keeping v prefix for consistency with other artifacts)
          for rpm in ~/rpmbuild/RPMS/*/*.rpm; do
            filename=$(basename "$rpm")
            # Replace version-release pattern with tag-fedora version
            newname=$(echo "$filename" | sed "s/levin-$VERSION-1.fc${{ matrix.fedora }}/levin-${{ github.ref_name }}-fedora${{ matrix.fedora }}/")
            cp "$rpm" "$GITHUB_WORKSPACE/dist/$newname"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fedora-${{ matrix.fedora }}
          path: dist/*.rpm
          retention-days: 90

  build-macos:
    name: Build macOS Binary
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake boost openssl@3 pkg-config curl

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Create tarball
        run: |
          mkdir -p dist/levin-${{ github.ref_name }}-macos/bin
          cp build/levin dist/levin-${{ github.ref_name }}-macos/bin/
          cp LICENSE dist/levin-${{ github.ref_name }}-macos/
          cp README.md dist/levin-${{ github.ref_name }}-macos/
          cd dist
          tar czf levin-${{ github.ref_name }}-macos-arm64.tar.gz levin-${{ github.ref_name }}-macos/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: dist/*.tar.gz
          retention-days: 90

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace
      
      - name: Rename APK with version
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             dist/levin-${{ github.ref_name }}-android.apk
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: [build-debian, build-rpm, build-macos, build-android]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.apk" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate release notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## Levin ${{ github.ref_name }}
          
          BitTorrent archive daemon for distributed content preservation.
          
          ### Installation
          
          #### Android
          ```
          1. Download levin-${{ github.ref_name }}-android.apk
          2. Enable "Install from Unknown Sources" in Android settings
          3. Open the APK file to install
          4. Launch Levin from your app drawer
          ```
          
          **Note**: This is an unsigned APK for testing. You may see a security warning during installation.
          
          #### Debian/Ubuntu
          ```bash
          # Download the .deb for your Ubuntu version
          sudo dpkg -i levin_${{ github.ref_name }}_ubuntu-*.deb
          sudo apt-get install -f  # Install dependencies if needed
          ```
          
          #### Fedora/RHEL
          ```bash
          # Download the .rpm for your Fedora version
          sudo dnf install levin-${{ github.ref_name }}-fedora*.rpm
          ```
          
          #### Arch Linux
          ```bash
          # Install from AUR
          yay -S levin
          # or
          paru -S levin
          ```
          
          #### macOS
          ```bash
          # Using Homebrew
          brew tap bjesus/levin
          brew install levin
          
          # Or manually from tarball
          tar xzf levin-${{ github.ref_name }}-macos-arm64.tar.gz
          sudo cp levin-${{ github.ref_name }}-macos/bin/* /usr/local/bin/
          ```
          
          ### Getting Started
          
          **Desktop (Linux/macOS)**:
          1. Start the daemon: `levin start` (creates config automatically on first run)
          2. Check status: `levin status`
          3. Enable automatic start: `systemctl --user enable levin` (Linux) or `brew services start levin` (macOS)
          
          See `levin --help` for all commands.
          
          **Android**:
          1. Open the Levin app
          2. Add torrent files or magnet links from the "Add Torrent" screen
          3. Monitor your torrents and statistics from the main screen
          
          ### What's New
          
          See [CHANGELOG.md](CHANGELOG.md) for details.
          
          ### Documentation
          
          - [Installation Guide](INSTALL.md)
          - [README](README.md)
          - [Configuration Reference](https://github.com/bjesus/levin#configuration)
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
