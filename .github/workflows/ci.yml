name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-latest]
        build_type: [Debug, Release]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-system-dev \
            libboost-filesystem-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libglib2.0-dev \
            pkg-config \
            git

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake boost openssl@3 pkg-config curl

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTS=ON \
            ${{ runner.os == 'macOS' && '-DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3' || '' }}

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --verbose

      - name: Test binaries
        run: |
          ./build/levin --version
          ./build/levin --help

      - name: Prepare artifact
        if: matrix.build_type == 'Release'
        run: |
          mkdir -p artifact
          cp build/levin artifact/
          # Strip debug symbols for smaller size
          if [ "${{ runner.os }}" = "Linux" ]; then
            strip artifact/levin
          elif [ "${{ runner.os }}" = "macOS" ]; then
            strip -x artifact/levin
          fi
          # Add version info
          echo "$(./build/levin --version)" > artifact/VERSION.txt
          echo "OS: ${{ matrix.os }}" >> artifact/VERSION.txt
          echo "Build Type: ${{ matrix.build_type }}" >> artifact/VERSION.txt
          echo "Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> artifact/VERSION.txt
          echo "Commit: ${{ github.sha }}" >> artifact/VERSION.txt

      - name: Upload binary artifact
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: levin-${{ matrix.os }}-${{ matrix.build_type }}
          path: artifact/
          retention-days: 30
          if-no-files-found: error

  build-packages:
    name: Build Packages (Ubuntu ${{ matrix.ubuntu }})
    runs-on: ubuntu-${{ matrix.ubuntu }}
    strategy:
      matrix:
        ubuntu: ['22.04', '24.04']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-system-dev \
            libboost-filesystem-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libglib2.0-dev \
            pkg-config \
            debhelper \
            devscripts \
            git

      - name: Build Debian package
        run: |
          # Link packaging/debian to debian/ for dpkg-buildpackage
          ln -s packaging/debian debian
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../levin_*.deb dist/
          # Rename with commit SHA for identification
          COMMIT_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          mv dist/levin_*.deb dist/levin_ubuntu-${{ matrix.ubuntu }}_${COMMIT_SHORT}_amd64.deb

      - name: Test package installation
        run: |
          sudo dpkg -i dist/*.deb || sudo apt-get install -f -y
          levin --version
          levin --help

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package-ubuntu-${{ matrix.ubuntu }}
          path: dist/*.deb
          retention-days: 30
          if-no-files-found: error

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-system-dev \
            libboost-filesystem-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libglib2.0-dev \
            pkg-config \
            cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --error-exitcode=1 \
            -I src \
            src/ 2>&1 | tee cppcheck.log

      - name: Check for TODO/FIXME
        run: |
          if grep -rn "TODO\|FIXME" src/ --exclude-dir=build; then
            echo "::warning::Found TODO or FIXME comments"
          fi

  e2e-tests-desktop:
    name: E2E Tests (Desktop)
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-system-dev \
            libboost-filesystem-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libglib2.0-dev \
            pkg-config \
            bats \
            git

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Run E2E tests
        run: |
          chmod +x e2e/desktop/run_tests.sh
          ./e2e/desktop/run_tests.sh
        timeout-minutes: 15

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-desktop-logs
          path: /tmp/levin-e2e-*/
          retention-days: 7

  package-validation:
    name: Validate Package Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Debian package
        run: |
          if [ ! -f packaging/debian/control ]; then
            echo "::error::packaging/debian/control missing"
            exit 1
          fi
          if [ ! -f packaging/debian/rules ]; then
            echo "::error::packaging/debian/rules missing"
            exit 1
          fi
          if [ ! -x packaging/debian/rules ]; then
            echo "::error::packaging/debian/rules not executable"
            exit 1
          fi

      - name: Validate RPM spec
        run: |
          if [ ! -f packaging/rpm/levin.spec ]; then
            echo "::error::packaging/rpm/levin.spec missing"
            exit 1
          fi

      - name: Validate AUR PKGBUILD
        run: |
          if [ ! -f packaging/aur/PKGBUILD ]; then
            echo "::error::packaging/aur/PKGBUILD missing"
            exit 1
          fi

      - name: Check systemd service
        run: |
          if [ ! -f scripts/levin.service ]; then
            echo "::error::systemd service file missing"
            exit 1
          fi
